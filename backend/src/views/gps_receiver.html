<!DOCTYPE html>
<html>
<head>
  <title>Admin Map GPS</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 90vh; }
  </style>
</head>
<body>

<h2>ADMIN - Monitoring GPS</h2>
<div id="map"></div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbznbWAOdCQXuKyGP50xjk3sgluLxRmIRYmd-ebeT8BomSUutK5hAgALAswkWTF1cWrnQg/exec";
const device_id = "dev-001";

const map = L.map('map').setView([-7.2575, 112.7521], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker;
let polyline;

function loadData() {
  // ambil latest
  fetch(BASE_URL + `/telemetry/gps/latest?device_id=${device_id}`)
    .then(res => res.json())
    .then(res => {
      const d = res.data;
      if (!d) return;

      if (marker) map.removeLayer(marker);

      marker = L.marker([d.lat, d.lng]).addTo(map)
        .bindPopup("Latest Location");

      map.setView([d.lat, d.lng], 17);
    });

  // ambil history
  fetch(BASE_URL + `/telemetry/gps/history?device_id=${device_id}&limit=100`)
    .then(res => res.json())
    .then(res => {
      const items = res.data.items;

      const latlngs = items.map(i => [i.lat, i.lng]);

      if (polyline) map.removeLayer(polyline);

      polyline = L.polyline(latlngs, {color: 'blue'}).addTo(map);
    });
}

// refresh tiap 5 detik
setInterval(loadData, 5000);
loadData();

</script>

</body>
</html>
