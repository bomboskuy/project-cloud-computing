<!DOCTYPE html>
<html>
<head>
  <title>Admin GPS Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  
  <style>
    #map { height: 90vh; }
  </style>
</head>
<body>

<h2>🗺️ GPS Tracking (Admin)</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbzfLG76eT7pekm_nHLRLtEhr4NWk0HKHgWn7KkjoPIfabTLyMHhicxO1keotjDpcMHlcg/exec";
const DEVICE_ID = "dev-001";

let map = L.map('map').setView([-7.2575, 112.7521], 15);
let marker = null;
let polyline = null;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

function loadLatest() {
  fetch(`${BASE_URL}/telemetry/gps/latest?device_id=${DEVICE_ID}`)
    .then(res => res.json())
    .then(res => {
      if (!res.ok) return;

      const d = res.data;
      const latlng = [d.lat, d.lng];

      if (marker) {
        marker.setLatLng(latlng);
      } else {
        marker = L.marker(latlng).addTo(map);
      }

      map.setView(latlng, 16);
    });
}

function loadHistory() {
  fetch(`${BASE_URL}/telemetry/gps/history?device_id=${DEVICE_ID}&limit=100`)
    .then(res => res.json())
    .then(res => {
      if (!res.ok) return;

      const points = res.data.items.map(p => [p.lat, p.lng]);

      if (polyline) {
        polyline.setLatLngs(points);
      } else {
        polyline = L.polyline(points, { color: 'blue' }).addTo(map);
      }
    });
}

// Auto refresh tiap 5 detik
setInterval(() => {
  loadLatest();
  loadHistory();
}, 5000);

// Load pertama
loadLatest();
loadHistory();
</script>

</body>
</html>
