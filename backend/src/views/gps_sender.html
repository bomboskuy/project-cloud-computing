<!DOCTYPE html>
<html>
<head>
  <title>User GPS Recorder</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }

    button {
      padding: 15px 25px;
      font-size: 18px;
      background: green;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
    }

    #console {
      margin-top: 20px;
      text-align: left;
      background: #111;
      color: #0f0;
      padding: 10px;
      height: 200px;
      overflow-y: auto;
      border-radius: 8px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<h2>📍 GPS Recorder (User)</h2>

<button onclick="startRecording()">▶ Start Record</button>

<p id="status">Belum mulai...</p>

<div id="console"></div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbzfLG76eT7pekm_nHLRLtEhr4NWk0HKHgWn7KkjoPIfabTLyMHhicxO1keotjDpcMHlcg/exec";
const DEVICE_ID = "dev-001";

let watchId = null;

// fungsi console custom
function log(msg) {
  const el = document.getElementById("console");
  const time = new Date().toLocaleTimeString();

  el.innerHTML += `[${time}] ${msg}<br>`;
  el.scrollTop = el.scrollHeight;
}

function startRecording() {
  log("Memulai GPS...");
  
  if (navigator.geolocation) {
    watchId = navigator.geolocation.watchPosition(sendLocation, error, {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 5000
    });
  } else {
    log("❌ Geolocation tidak didukung");
  }
}

function sendLocation(position) {
  const data = {
    device_id: DEVICE_ID,
    ts: new Date().toISOString(),
    lat: position.coords.latitude,
    lng: position.coords.longitude,
    accuracy_m: position.coords.accuracy,
    altitude: position.coords.altitude || 0
  };

  document.getElementById("status").innerText =
    `Lat: ${data.lat}, Lng: ${data.lng}`;

  log(`📤 Kirim: ${JSON.stringify(data)}`);

  fetch(BASE_URL + "/telemetry/gps", {
    method: "POST",
    mode: "no-cors", // 🔥 WAJIB biar tidak error
    body: JSON.stringify(data),
    headers: {
      "Content-Type": "application/json"
    }
  })
  .then(() => {
    // ⚠️ tidak bisa baca response karena no-cors
    log("✅ Data berhasil dikirim (cek spreadsheet)");
  })
  .catch(err => {
    log(`❌ Error: ${err}`);
  });
}

function error(err) {
  log(`❌ GPS Error: ${err.message}`);
}
</script>
