<!DOCTYPE html>
<html>
<head>
  <title>User GPS Tracker</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 30px; }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background: green;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>USER - GPS Tracker</h2>
<button onclick="startTracking()">Start Record</button>

<p id="status"></p>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbznbWAOdCQXuKyGP50xjk3sgluLxRmIRYmd-ebeT8BomSUutK5hAgALAswkWTF1cWrnQg/exec";
const device_id = "dev-001";

let watchId;

function startTracking() {
  if (navigator.geolocation) {
    watchId = navigator.geolocation.watchPosition(sendLocation, error);
    document.getElementById("status").innerText = "Recording...";
  } else {
    alert("GPS tidak didukung");
  }
}

function sendLocation(position) {
  const data = {
    device_id: device_id,
    ts: new Date().toISOString(),
    lat: position.coords.latitude,
    lng: position.coords.longitude,
    accuracy_m: position.coords.accuracy
  };

  fetch(BASE_URL + "/telemetry/gps", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    console.log("Sent:", res);
  });
}

function error(err) {
  alert("Error GPS: " + err.message);
}
</script>

</body>
</html>
