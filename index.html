<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Modul Cloud</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f6f8;
      padding: 40px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #007bff;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      background: #0056b3;
    }

    .role-box {
      display: none;
      margin-top: 20px;
    }

    .role-box button {
      background: #28a745;
      margin: 10px;
    }

    .role-box button:hover {
      background: #1e7e34;
    }
  </style>
</head>

<body>

<h1>☁️ Dashboard Praktik Komputasi Awan</h1>

<div class="menu">
  <button onclick="showRole('absensi')">📷 Absensi</button>
  <button onclick="showRole('accel')">📊 Accel</button>
  <button onclick="showRole('gps')">📍 GPS</button>
</div>

<div id="roleBox" class="role-box">
  <h3>Pilih Role:</h3>
  <button onclick="goTo('admin')">👨‍💼 Admin</button>
  <button onclick="goTo('user')">👤 User</button>
</div>

<script>
let selectedModule = "";

function showRole(module) {
  selectedModule = module;
  document.getElementById("roleBox").style.display = "block";
}

function goTo(role) {

  // ================= GPS =================
  if (selectedModule === "gps") {
    if (role === "admin") {
      window.location.href = "backend/src/views/gps_receiver.html";
    } else {
      window.location.href = "backend/src/views/gps_sender.html";
    }
  }

  // ================= ACCEL =================
  else if (selectedModule === "accel") {
    if (role === "admin") {
      alert("Halaman Admin Accel belum dibuat");
    } else {
      alert("Halaman User Accel belum dibuat");
    }
  }

  // ================= ABSENSI =================
  else if (selectedModule === "absensi") {
    if (role === "admin") {
      alert("Halaman Admin Absensi belum dibuat");
    } else {
      alert("Halaman User Absensi belum dibuat");
    }
  }
}
</script>

</body>
</html>
