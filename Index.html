<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>Dashboard Presensi</title>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22263a;
      --primary: #6c5ce7;
      --primary-glow: rgba(108, 92, 231, .35);
      --text: #e4e6eb;
      --text-muted: #8b8fa3;
      --border: rgba(255,255,255,.06);
      --success: #00cec9;
      --danger: #ff7675;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* ---- Header ---- */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      color: var(--text-muted);
      margin-top: .4rem;
      font-size: .85rem;
    }

    /* ---- Card ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      transition: transform .2s;
    }

    /* ---- Meta Row ---- */
    .meta-row {
      display: flex;
      gap: .5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .badge {
      background: rgba(108,92,231,.15);
      color: var(--primary);
      font-size: .75rem;
      font-weight: 600;
      padding: .35rem .75rem;
      border-radius: 999px;
      letter-spacing: .02em;
    }

    /* ---- QR Container ---- */
    #qr-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 220px;
      border-radius: 12px;
      background: var(--bg);
      border: 1px dashed var(--border);
      position: relative;
      overflow: hidden;
    }
    #qr-container img { border-radius: 4px; }
    #placeholder {
      color: var(--text-muted);
      font-size: .85rem;
    }

    /* ---- Status ---- */
    .status {
      text-align: center;
      margin-top: 1rem;
      font-size: .82rem;
      min-height: 2.4em;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .status.ok   { color: var(--success); }
    .status.fail { color: var(--danger); }

    /* ---- Button ---- */
    .btn {
      display: block;
      width: 100%;
      margin-top: 1.25rem;
      padding: .85rem;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), #a48bf0);
      box-shadow: 0 4px 20px var(--primary-glow);
      transition: opacity .2s, transform .15s;
    }
    .btn:hover  { opacity: .9; transform: translateY(-1px); }
    .btn:active { transform: scale(.98); }
    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    /* ---- Spinner ---- */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    /* ---- Footer ---- */
    .footer {
      margin-top: 2rem;
      font-size: .7rem;
      color: var(--text-muted);
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <div class="header">
    <h1>📋 Dashboard Presensi</h1>
    <p>Scan QR untuk check-in kehadiran</p>
  </div>

  <div class="card">
    <div class="meta-row">
      <span class="badge">Course: cloud-101</span>
      <span class="badge">Sesi: 02</span>
    </div>

    <div id="qr-container">
      <span id="placeholder">Klik tombol di bawah untuk generate QR</span>
    </div>

    <div id="status-text" class="status"></div>

    <button id="gen-btn" class="btn" onclick="generateQR()">⚡ Generate QR Baru</button>
  </div>

  <div class="footer">Presensi QR Dinamis &middot; Google Apps Script</div>

  <script>
    var qrcode = null;

    function generateQR() {
      var btn    = document.getElementById('gen-btn');
      var box    = document.getElementById('qr-container');
      var status = document.getElementById('status-text');

      btn.disabled = true;
      status.className = 'status';
      status.innerText = '';
      box.innerHTML = '<div class="spinner"></div>';

      var payload = {
        course_id:  'cloud-101',
        session_id: 'sesi-02',
        ts:         new Date().toISOString()
      };

      google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(onError)
        .processGenerateQR(payload);
    }

    function onSuccess(response) {
      var btn    = document.getElementById('gen-btn');
      var box    = document.getElementById('qr-container');
      var status = document.getElementById('status-text');
      btn.disabled = false;

      if (response.ok) {
        status.className = 'status ok';
        status.innerText = 'Token: ' + response.data.qr_token +
          '\nExpires: ' + new Date(response.data.expires_at).toLocaleTimeString();

        box.innerHTML = '';
        qrcode = new QRCode(box, {
          text:         response.data.qr_token,
          width:        200,
          height:       200,
          colorDark:    '#ffffff',
          colorLight:   '#0f1117',
          correctLevel: QRCode.CorrectLevel.H
        });
      } else {
        status.className = 'status fail';
        status.innerText = 'Error: ' + response.error;
      }
    }

    function onError(error) {
      var btn    = document.getElementById('gen-btn');
      var status = document.getElementById('status-text');
      btn.disabled = false;
      status.className = 'status fail';
      status.innerText = 'Terjadi kesalahan jaringan!';
      console.error(error);
    }
  </script>
</body>
</html>
